<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESS App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5aa9ff">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#dfe6ee;
}

.header{
    background: linear-gradient(90deg,#5aa9ff,#e6a37c);
    padding:10px;
    color:white;
}

.header-top{
    display:flex;
    justify-content:space-between;
}

.header-title{
    text-align:center;
}

.profile{
    margin:15px;
    border-radius:20px;
    background:#d5dee8;
    overflow:hidden;
}

.profile-head{
    background:#1e56a0;
    color:white;
    padding:12px;
    text-align:center;
}

.profile-body{
    height:140px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    padding:12px;
}

.box{
    background:#5aa9ff;
    border-radius:22px;
    height:110px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.box img{
    width:38px;
}

.grid-bottom{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    padding:12px;
}
</style>

</head>

<body>

<div class="header">
    <div class="header-top">
        ☰ <b>RESS</b> 🔔
    </div>

    <div class="header-title">
        <h3>Railway Employee Self Service</h3>
        <b style="color:gold;">Indian Railways</b>
    </div>
</div>

<div class="profile">
    <div class="profile-head">
        WELCOME TRIVENI KUMAR <br>
        Employee No. 45329801445
    </div>
    <div class="profile-body">
        NO IMAGE FOUND
    </div>
</div>

<div class="grid">
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/user.png"><p>Bio Data</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/rupee.png"><p>Salary</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/piggy-bank.png"><p>NPS</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/tax.png"><p>Income Tax</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/money.png"><p>Loans</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/calendar.png"><p>Leave</p></div>
</div>

<div class="grid-bottom">
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/family.png"><p>Family</p></div>
    <div class="box"><img src="https://img.icons8.com/ios-filled/50/retirement.png"><p>Retirement</p></div>
</div>

</body>
</html>
